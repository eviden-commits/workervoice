<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Worker Voice</title>
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>
  <style>
    :root {
      --bg:#f5f5f7; --surface:#fff; --line:#d1d1d6; --text:#1a1c1d; --muted:#44474d;
      --primary:#1a2b47; --secondary:#0070eb; --low:#28a745; --medium:#ff9500; --high:#ff3b30; --critical:#af52de;
      --radius:16px; --shadow:0 4px 12px rgba(0,0,0,.05),0 1px 3px rgba(0,0,0,.02);
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text)}
    .topbar{height:64px;border-bottom:1px solid #c5c6ce;background:var(--surface);display:flex;align-items:center}
    .topbar-inner{max-width:1280px;width:100%;margin:0 auto;padding:0 16px}
    .brand{font-size:46px;font-weight:800;color:#0d1b37;line-height:1}
    .container{max-width:1280px;margin:0 auto;padding:24px 16px 40px}
    .hero-title{font-size:34px;margin:0 0 8px;color:#0d1b37}
    .hero-sub{margin:0 0 18px;color:var(--muted)}
    .grid{display:grid;grid-template-columns:1.35fr .95fr;gap:24px}
    @media (max-width:1060px){.grid{grid-template-columns:1fr}.brand{font-size:34px}}
    .card{background:var(--surface);border:1px solid #e9eaee;border-radius:var(--radius);box-shadow:var(--shadow);padding:24px}
    .section-title{font-size:30px;margin:0 0 14px;color:#0d1b37}
    .label{font-size:13px;font-weight:700;color:var(--muted);display:block;margin-bottom:6px}
    input,select,textarea{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:12px 14px;font:inherit;background:#fff;color:var(--text)}
    input:focus,select:focus,textarea:focus{outline:none;border-color:var(--secondary);box-shadow:0 0 0 3px rgba(0,112,235,.2)}
    textarea{min-height:120px;resize:vertical}
    .form-grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .form-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
    @media (max-width:820px){.form-grid2,.form-grid3{grid-template-columns:1fr}}
    .risk-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:4px}
    .risk-btn{border:0;color:#fff;font-weight:700;border-radius:8px;padding:10px 6px;cursor:pointer;opacity:.55}
    .risk-btn.active{opacity:1;box-shadow:inset 0 0 0 2px rgba(255,255,255,.4)}
    .risk-low{background:var(--low)} .risk-medium{background:var(--medium)} .risk-high{background:var(--high)} .risk-critical{background:var(--critical)}
    .upload-box{border:1px dashed #c5c6ce;background:#f3f3f5;border-radius:10px;padding:14px;display:flex;justify-content:space-between;align-items:center;gap:10px}
    .toggle{display:flex;align-items:center;gap:8px;margin-top:8px}
    .toggle input[type="checkbox"]{width:44px;height:24px}
    .submit-btn{width:100%;border:0;color:#fff;font-size:22px;font-weight:700;border-radius:10px;padding:14px 16px;cursor:pointer;background:linear-gradient(to bottom,#1a2b47,#0d1624);box-shadow:var(--shadow)}
    .submit-btn:disabled{opacity:.7;cursor:not-allowed}
    .notice{font-size:14px;color:var(--muted);margin-top:10px}
    .success{margin-top:10px;border:1px solid #b9e3c2;background:#effbf2;color:#136b2a;border-radius:10px;padding:12px 14px;font-size:14px}
    .lookup-box{display:flex;gap:8px;margin:10px 0 12px}
    .lookup-box input{flex:1}
    .lookup-btn{border:0;border-radius:10px;background:var(--secondary);color:#fff;font-weight:700;padding:10px 16px;cursor:pointer}
    .item{border-top:1px solid #ececf0;padding:12px 0}
    .item:first-child{border-top:0}
    .pill{display:inline-block;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:700;color:#fff;margin-right:6px}
    .status{font-size:12px;color:var(--muted)}
    .title{font-size:18px;font-weight:700;margin:6px 0;color:#111f3f}
    .meta{color:var(--muted);font-size:13px}
    .content{margin-top:6px;white-space:pre-wrap}
  </style>
</head>
<body>
  <header class="topbar"><div class="topbar-inner"><div class="brand">Worker Voice</div></div></header>
  <main class="container">
    <h2 class="hero-title">근로자의 의견청취(작업중지권포함)</h2>
    <p class="hero-sub">안전하고 신뢰할 수 있는 일터를 만들기 위한 여러분의 의견을 들려주세요.</p>

    <div class="grid">
      <section class="card">
        <h3 class="section-title">신규 보고서 작성</h3>
        <form id="voiceForm" method="post" target="submitFrame">
          <input type="hidden" name="action" value="create" />
          <input type="hidden" name="response_mode" value="iframe" />
          <input type="hidden" name="risk_level" id="riskLevel" value="medium" />
          <input type="hidden" name="is_anonymous" id="isAnonymousHidden" value="FALSE" />
          <input type="hidden" name="recaptcha_token" id="recaptchaToken" />

          <div class="form-grid2">
            <div>
              <label class="label">카테고리</label>
              <select name="category" id="category" required>
                <option value="안전관리">안전관리</option>
                <option value="노무관리">노무관리</option>
                <option value="기타관리">기타관리</option>
              </select>
            </div>
            <div>
              <label class="label">위험 수준</label>
              <div class="risk-row">
                <button type="button" class="risk-btn risk-low" data-risk="low">낮음</button>
                <button type="button" class="risk-btn risk-medium active" data-risk="medium">보통</button>
                <button type="button" class="risk-btn risk-high" data-risk="high">높음</button>
                <button type="button" class="risk-btn risk-critical" data-risk="critical">긴급</button>
              </div>
            </div>
          </div>

          <div style="margin-top:12px;">
            <label class="label">현장 이름</label>
            <select name="site_name" id="siteName" required><option value="">현장 선택</option></select>
          </div>

          <div style="margin-top:12px;">
            <label class="label">제목(상용구)</label>
            <select id="titleTemplate" required></select>
            <input id="titleInput" name="title" maxlength="100" placeholder="문제점을 간략하게 요약해 주세요..." style="margin-top:8px;" disabled required />
          </div>

          <div style="margin-top:12px;">
            <label class="label">세부 내용</label>
            <textarea name="content" placeholder="발생 위치, 시간, 관련자 등 구체적인 내용을 입력해 주세요..." required></textarea>
          </div>

          <div style="margin-top:12px;" class="upload-box">
            <div class="notice">파일 업로드 (PDF, JPG, PNG)</div>
            <div>
              <input id="attachmentFile" type="file" accept="image/*" />
              <input type="hidden" name="attachment_base64" id="attachmentBase64" />
              <input type="hidden" name="attachment_name" id="attachmentName" />
              <input type="hidden" name="attachment_mime" id="attachmentMime" />
            </div>
          </div>

          <div class="toggle">
            <input type="checkbox" id="isAnonymousToggle" />
            <span><strong>익명으로 제출하기</strong></span>
          </div>

          <div class="form-grid3" style="margin-top:10px;">
            <div><label class="label">이름</label><input name="reporter_name" id="reporterName" inputmode="text" /></div>
            <div><label class="label">전화번호</label><input name="reporter_contact" id="reporterContact" inputmode="numeric" pattern="[0-9]*" maxlength="11" placeholder="01000000000" /></div>
            <div><label class="label">이메일 주소</label><input name="reporter_email" id="reporterEmail" type="email" placeholder="email@company.com" /></div>
          </div>

          <button class="submit-btn" id="submitBtn" type="submit" style="margin-top:14px;">보고서 제출하기</button>
          <div style="margin-top:10px;" class="g-recaptcha" data-sitekey="6LddEQgtAAAAAM8zq-90lWoC40XAuqCmOpe5uT3u"></div>
          <div class="notice" id="submitMsg">접수 대기 중</div>
          <div class="success" id="receiptMsg" style="display:none;"></div>
        </form>
        <iframe name="submitFrame" style="display:none"></iframe>
      </section>

      <section class="card">
        <h3 style="font-size:30px;margin:0 0 10px;">보고서 및 문의 내역</h3>
        <div class="lookup-box">
          <input id="receiptNoInput" maxlength="4" placeholder="접수번호 4자리 입력" />
          <button class="lookup-btn" id="btnLookup">조회</button>
        </div>
        <div id="list"><p class="notice">접수번호로 조회하면 처리결과를 확인할 수 있습니다.</p></div>
      </section>
    </div>
  </main>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyEhd91bxscWGtnLiEwb74vpEcEsNicXHaEdquyLjEkY3-Wxrv-5_5OMoF3f0s6NRzG/exec";
    const titleTemplates = {
      "안전관리": ["작업중지권 발동","보호구 미착용/지급 부족","추락·낙하 위험 구간 안전조치 미흡","전기·기계 설비 안전점검 필요","비상대응(소화기·대피동선) 점검 요청"],
      "노무관리": ["근로계약/업무지시 내용 확인 요청","근무시간·휴게시간 운영 개선 요청","임금/수당 산정 관련 확인 요청","현장 배치·업무분장 조정 요청","직장 내 고충/소통 개선 요청"],
      "기타관리": ["현장 시설·환경 개선 요청","자재·장비 지원 요청","업무 프로세스 개선 제안","교육·안내자료 보강 요청","기타 운영 관련 건의"]
    };
    const riskLabel = { low:"낮음", medium:"보통", high:"높음", critical:"긴급" };
    const statusLabel = { active:"처리중", in_review:"검토중", done:"완료", hold:"보류" };

    const voiceForm = document.getElementById("voiceForm");
    const submitBtn = document.getElementById("submitBtn");
    const submitMsg = document.getElementById("submitMsg");
    const receiptMsg = document.getElementById("receiptMsg");
    const categoryEl = document.getElementById("category");
    const titleTemplateEl = document.getElementById("titleTemplate");
    const titleInputEl = document.getElementById("titleInput");
    const siteNameEl = document.getElementById("siteName");
    const isAnonymousToggle = document.getElementById("isAnonymousToggle");
    const isAnonymousHidden = document.getElementById("isAnonymousHidden");
    const reporterName = document.getElementById("reporterName");
    const reporterContact = document.getElementById("reporterContact");
    const reporterEmail = document.getElementById("reporterEmail");
    const receiptNoInput = document.getElementById("receiptNoInput");
    const listEl = document.getElementById("list");
    const riskLevelEl = document.getElementById("riskLevel");
    const recaptchaTokenEl = document.getElementById("recaptchaToken");
    const attachmentFile = document.getElementById("attachmentFile");
    const attachmentBase64 = document.getElementById("attachmentBase64");
    const attachmentName = document.getElementById("attachmentName");
    const attachmentMime = document.getElementById("attachmentMime");

    function esc(v){ return String(v||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#39;"); }
    function sanitizeName(v){ return String(v||"").replace(/[^A-Za-z가-힣\s]/g,"").replace(/\s{2,}/g," ").trim(); }
    function sanitizePhone(v){ return String(v||"").replace(/\D/g,""); }

    function jsonp(url, onOk, onError){
      const cb = "cb_" + Date.now() + "_" + Math.floor(Math.random()*1000);
      let done = false;
      const timer = setTimeout(() => { if(done) return; done = true; delete window[cb]; onError && onError("요청 시간 초과"); }, 8000);
      window[cb] = function(res){ if(done) return; done = true; clearTimeout(timer); delete window[cb]; onOk(res); };
      url.searchParams.set("callback", cb);
      const s = document.createElement("script");
      s.src = url.toString();
      s.onerror = () => { if(done) return; done = true; clearTimeout(timer); delete window[cb]; onError && onError("스크립트 로드 실패"); };
      s.onload = () => s.remove();
      document.body.appendChild(s);
    }

    function setIdentityMode(){
      const anon = isAnonymousToggle.checked;
      isAnonymousHidden.value = anon ? "TRUE" : "FALSE";
      reporterName.disabled = anon; reporterContact.disabled = anon; reporterEmail.disabled = anon;
      reporterName.required = !anon; reporterContact.required = !anon; reporterEmail.required = !anon;
      if(anon){ reporterName.value=""; reporterContact.value=""; reporterEmail.value=""; }
    }

    function renderTitleTemplates(){
      const items = titleTemplates[categoryEl.value] || [];
      titleTemplateEl.innerHTML = ['<option value="">상용구 선택</option>']
        .concat(items.map(v=>`<option value="${esc(v)}">${esc(v)}</option>`))
        .concat('<option value="__custom__">직접입력</option>').join("");
      titleInputEl.value = ""; titleInputEl.disabled = true;
    }

    function onTemplateChange(){
      const v = titleTemplateEl.value;
      if(v === "__custom__"){ titleInputEl.disabled = false; titleInputEl.value = ""; titleInputEl.focus(); return; }
      if(!v){ titleInputEl.disabled = true; titleInputEl.value = ""; return; }
      titleInputEl.disabled = false; titleInputEl.value = v; titleInputEl.disabled = true;
    }

    function loadSites(){
      const url = new URL(GAS_URL); url.searchParams.set("action","sites");
      jsonp(url, (res) => {
        if(!res || !res.ok){ submitMsg.textContent = "현장 로딩 실패: 서버 응답 오류"; return; }
        const items = res.items || [];
        if(!items.length){ submitMsg.textContent = "현장 로딩 실패: site 탭 데이터 없음"; return; }
        siteNameEl.innerHTML = '<option value="">현장 선택</option>' + items.map(v=>`<option value="${esc(v)}">${esc(v)}</option>`).join("");
        submitMsg.textContent = `현장 로딩 완료 (${items.length}개)`;
      }, (reason) => {
        siteNameEl.innerHTML = '<option value="">현장 선택 (실패)</option>';
        submitMsg.textContent = `현장 로딩 실패: ${reason} / 배포권한(Anyone)·URL·재배포 확인`;
      });
    }

    function renderList(items){
      if(!items.length){ listEl.innerHTML = '<p class="notice">일치하는 접수 건이 없습니다.</p>'; return; }
      listEl.innerHTML = items.map(it => {
        const risk = it.risk_level || "medium";
        const riskColor = risk === "low" ? "var(--low)" : risk === "high" ? "var(--high)" : risk === "critical" ? "var(--critical)" : "var(--medium)";
        return `<article class="item">
          <div><span class="pill" style="background:${riskColor};">${esc(riskLabel[risk] || risk)}</span><span class="status">${esc(statusLabel[it.status] || it.status || "")}</span></div>
          <div class="title">${esc(it.title || "")}</div>
          <div class="meta">${esc(it.category || "")} · ${esc(it.created_at || "")} · ${esc(it.site_name || "")}</div>
          <div class="content">${esc(it.content || "")}</div>
        </article>`;
      }).join("");
    }

    function lookupByReceipt(){
      const receipt = (receiptNoInput.value || "").trim();
      if(!/^\\d{4}$/.test(receipt)){ listEl.innerHTML = '<p class="notice">접수번호 4자리를 입력해 주세요.</p>'; return; }
      const url = new URL(GAS_URL);
      url.searchParams.set("action","receipt_lookup");
      url.searchParams.set("receipt_no",receipt);
      jsonp(url, (res) => {
        if(!res || !res.ok){ listEl.innerHTML = `<p class="notice">조회 실패: ${esc((res && res.error) || "unknown")}</p>`; return; }
        renderList(res.items || []);
      }, (reason) => { listEl.innerHTML = `<p class="notice">조회 실패: ${esc(reason)}</p>`; });
    }

    function fileToDataUrl(file){
      return new Promise((resolve,reject)=>{ const r = new FileReader(); r.onload=()=>resolve(r.result); r.onerror=reject; r.readAsDataURL(file); });
    }

    document.querySelectorAll(".risk-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".risk-btn").forEach(x => x.classList.remove("active"));
        btn.classList.add("active");
        riskLevelEl.value = btn.dataset.risk;
      });
    });

    reporterName.addEventListener("input", () => { const v = sanitizeName(reporterName.value); if(v !== reporterName.value) reporterName.value = v; });
    reporterContact.addEventListener("input", () => { const v = sanitizePhone(reporterContact.value); if(v !== reporterContact.value) reporterContact.value = v; });
    isAnonymousToggle.addEventListener("change", setIdentityMode);
    categoryEl.addEventListener("change", renderTitleTemplates);
    titleTemplateEl.addEventListener("change", onTemplateChange);
    document.getElementById("btnLookup").addEventListener("click", lookupByReceipt);

    voiceForm.addEventListener("submit", async (ev) => {
      ev.preventDefault();
      reporterName.value = sanitizeName(reporterName.value);
      reporterContact.value = sanitizePhone(reporterContact.value);

      if(window.grecaptcha){
        const token = grecaptcha.getResponse();
        if(!token){ submitMsg.textContent = "자동생성방지 확인을 완료해 주세요."; return; }
        recaptchaTokenEl.value = token;
      }

      const file = attachmentFile.files && attachmentFile.files[0];
      if(file){
        if(file.size > 10*1024*1024){ submitMsg.textContent = "첨부파일은 최대 10MB까지 가능합니다."; return; }
        submitMsg.textContent = "첨부파일 처리 중...";
        const dataUrl = await fileToDataUrl(file);
        attachmentBase64.value = dataUrl;
        attachmentName.value = file.name || "attachment";
        attachmentMime.value = file.type || "application/octet-stream";
      } else {
        attachmentBase64.value = ""; attachmentName.value = ""; attachmentMime.value = "";
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "제출 중...";
      submitMsg.textContent = "접수 중...";
      receiptMsg.style.display = "none";
      voiceForm.action = GAS_URL;
      voiceForm.submit();
      window.__submitPending = true;
      setTimeout(() => {
        if(!window.__submitPending) return;
        submitMsg.textContent = "접수 응답 지연: 서버 재배포/권한/리캡차 설정을 확인해 주세요.";
      }, 10000);
    });

    window.addEventListener("message", (event) => {
      const data = event.data || {};
      window.__submitPending = false;
      submitBtn.disabled = false;
      submitBtn.textContent = "보고서 제출하기";

      if(!data.ok){
        submitMsg.textContent = `접수 실패: ${data.error || "unknown error"}`;
        alert(`접수 실패\n${data.error || "unknown error"}`);
        return;
      }
      if(!data.id){
        submitMsg.textContent = "접수 실패: 접수번호 수신 실패";
        alert("접수 실패\n접수번호 수신 실패");
        return;
      }
      const anon = isAnonymousToggle.checked;
      const receipt = String(data.id).slice(-4);
      submitMsg.textContent = anon
        ? "접수가 완료되었으나, 개선결과는 통지받지 못할수 있습니다."
        : "접수가 완료되었습니다. 소중한 제보 감사합니다.";
      receiptMsg.style.display = "block";
      receiptMsg.innerHTML = `보고서가 성공적으로 제출되었습니다. 접수번호는 <strong>#${esc(receipt)}</strong> 입니다.`;
      receiptNoInput.value = receipt;
      if(window.grecaptcha) grecaptcha.reset();
    });

    setIdentityMode();
    renderTitleTemplates();
    loadSites();
  </script>
</body>
</html>
